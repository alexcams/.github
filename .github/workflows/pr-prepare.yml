name: Prepare PR

on:
  workflow_call:
    secrets:
      token:
        description: 'GitHub token with repository write access'
        required: true

jobs:
  notify-labels:
    name: Post available labels
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    permissions:
      pull-requests: write
    steps:
      - name: Post comment
        env:
          GH_TOKEN: ${{ secrets.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "The following labels are available to update the changelog and plugin version:

          | Label | Description |
          |-------|-------------|
          | \`changelog:add\` | Add changelog entry without version bump |
          | \`release:patch\` | Bump patch version and update changelog |
          | \`release:minor\` | Bump minor version and update changelog |
          | \`release:major\` | Bump major version and update changelog |(Only for PRs targeting \`main\`)"

  reject-major:
    name: Reject major bump on non-main branch
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'labeled' &&
      github.event.label.name == 'release:major' &&
      github.event.pull_request.base.ref != 'main'
    permissions:
      pull-requests: write
    steps:
      - name: Post warning comment
        env:
          GH_TOKEN: ${{ secrets.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "⚠️ The \`release:major\` label is only supported on PRs targeting \`main\`. Branches linked to previous Logstash releases don't expect major version bumps.

          Please use \`release:minor\`, \`release:patch\`, or \`changelog:add\` instead."

  prepare-pr:
    name: Update changelog and version
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'labeled' &&
      contains(fromJSON('["release:major", "release:minor", "release:patch", "changelog:add"]'), github.event.label.name) &&
      (github.event.label.name != 'release:major' || github.event.pull_request.base.ref == 'main')
    permissions:
      contents: write
    steps:
      - name: Fetch files from head branch
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.token }}
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const [owner, repo] = pr.head.repo.full_name.split('/');
            const headRef = pr.head.ref;

            for (const path of ['version', 'VERSION']) {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: owner, repo: repo, path, ref: headRef
                });
                fs.writeFileSync('version-content', Buffer.from(data.content, 'base64').toString('utf8'));
                fs.writeFileSync('version-path', path);
                break;
              } catch (e) {
                if (path === 'VERSION') throw new Error('No version file found');
              }
            }

            const { data: changelogFile } = await github.rest.repos.getContent({
              owner: owner, repo: repo, path: 'CHANGELOG.md', ref: headRef
            });
            fs.writeFileSync('changelog-content', Buffer.from(changelogFile.content, 'base64').toString('utf8'));

      - name: Prepare changelog and version
        uses: actions/github-script@v9
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        with:
          script: |
            const fs = require('fs');
            const prTitle = process.env.PR_TITLE;
            const labelName = context.payload.label.name;
            const prNumber = context.payload.pull_request.number;
            const repoOwner = context.payload.repository.owner.login;
            const repoName = context.payload.repository.name;

            const unsafeChars = prTitle.match(/[^a-zA-Z0-9 _.,:;+=#@()\-]/g);
            if (unsafeChars) {
              throw new Error(`PR title contains unsupported characters: ${[...new Set(unsafeChars)].join(' ')}`);
            }

            const versionContent = fs.readFileSync('version-content', 'utf8');
            const match = versionContent.match(/(\d+)\.(\d+)\.(\d+)/);
            if (!match) throw new Error('Could not parse version number');
            let [, major, minor, patch] = match;
            major = parseInt(major); minor = parseInt(minor); patch = parseInt(patch);

            let newVersion;
            switch (labelName) {
              case 'release:major': newVersion = `${major + 1}.0.0`; break;
              case 'release:minor': newVersion = `${major}.${minor + 1}.0`; break;
              case 'release:patch': newVersion = `${major}.${minor}.${patch + 1}`; break;
            }

            const changelog = fs.readFileSync('changelog-content', 'utf8');
            const prUrl = `https://github.com/${repoOwner}/${repoName}/pull/${prNumber}`;
            const entry = `  - ${prTitle} [#${prNumber}](${prUrl})`;

            let newChangelog;
            if (labelName === 'changelog:add') {
              const lines = changelog.split('\n');
              lines.splice(1, 0, entry);
              newChangelog = lines.join('\n');
            } else {
              newChangelog = `## ${newVersion}\n${entry}\n\n${changelog}`;
            }

            fs.writeFileSync('new-changelog', newChangelog);
            if (labelName !== 'changelog:add') {
              fs.writeFileSync('new-version-content', versionContent.replace(/\d+\.\d+\.\d+/, newVersion));
            }
            fs.writeFileSync('commit-message', labelName === 'changelog:add'
              ? 'Add changelog entry'
              : `Update changelog and bump version to ${newVersion}`);

      - name: Commit changes
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.token }}
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const [owner, repo] = pr.head.repo.full_name.split('/');
            const headRef = pr.head.ref;

            const newChangelog = fs.readFileSync('new-changelog', 'utf8');
            const versionPath = fs.readFileSync('version-path', 'utf8').trim();
            const message = fs.readFileSync('commit-message', 'utf8').trim();

            const { data: ref } = await github.rest.git.getRef({
              owner: owner, repo: repo, ref: `heads/${headRef}`
            });
            const baseSha = ref.object.sha;

            const { data: baseCommit } = await github.rest.git.getCommit({
              owner: owner, repo: repo, commit_sha: baseSha
            });

            const { data: changelogBlob } = await github.rest.git.createBlob({
              owner: owner, repo: repo, content: newChangelog, encoding: 'utf-8'
            });

            const tree = [{
              path: 'CHANGELOG.md', mode: '100644', type: 'blob', sha: changelogBlob.sha
            }];

            if (fs.existsSync('new-version-content')) {
              const newVersionContent = fs.readFileSync('new-version-content', 'utf8');
              const { data: versionBlob } = await github.rest.git.createBlob({
                owner: owner, repo: repo, content: newVersionContent, encoding: 'utf-8'
              });
              tree.push({
                path: versionPath, mode: '100644', type: 'blob', sha: versionBlob.sha
              });
            }

            const { data: newTree } = await github.rest.git.createTree({
              owner: owner, repo: repo, base_tree: baseCommit.tree.sha, tree
            });

            const { data: newCommit } = await github.rest.git.createCommit({
              owner: owner, repo: repo,
              message,
              tree: newTree.sha,
              parents: [baseSha],
              author: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com'
              },
              committer: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com'
              }
            });

            await github.rest.git.updateRef({
              owner: owner, repo: repo, ref: `heads/${headRef}`, sha: newCommit.sha
            });

            core.info(`${message} (${newCommit.sha.substring(0, 7)})`);
